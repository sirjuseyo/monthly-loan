<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>써주세요. · Monthly Loan</title>
<meta name="description" content="20~33세 청년 서민을 위한 나노크레딧. 급할 때 빌려쓰는 써주세요.">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --purple:#380097;
  --orange:#FF5400;
  --mint:#A6D6DE;
  --cream:#FAF7F2;
  --text:#1A1A2E;
  --gray:#888;
}
html,body{background:var(--cream);min-height:100vh;font-family:'Noto Sans KR',sans-serif;}

/* wrap = 전체 페이지 컨테이너 */
.wrap{
  position:relative;
  overflow:hidden;
  min-height:100vh;
}

/* 배경 orb */
.orb-big{position:fixed;top:-70px;right:-70px;width:220px;height:220px;background:var(--orange);border-radius:50%;opacity:.08;pointer-events:none;z-index:0;}
.orb-sm{position:fixed;top:200px;left:-30px;width:80px;height:80px;background:var(--mint);border-radius:50%;opacity:.18;pointer-events:none;z-index:0;}

/* nav */
.nav{
  position:relative;z-index:2;
  padding:28px 24px 0;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-left{display:flex;align-items:center;gap:9px;}
.logo-img{width:44px;height:44px;object-fit:contain;}
.brand{font-size:.9rem;font-weight:800;color:var(--purple);}
.nav-menu{font-size:1.3rem;color:var(--purple);cursor:pointer;}

/* content 영역: 모바일은 세로 스택, 데스크탑은 좌우 분할 */
.content{
  position:relative;z-index:2;
  display:flex;
  flex-direction:column;
  padding:0;
}

/* hero */
.hero{padding:16px 24px 0;display:grid;grid-template-columns:1fr auto;grid-template-rows:auto auto;gap:0 12px;align-items:start;}
h1{grid-column:1;grid-row:1;font-size:2rem;font-weight:900;color:var(--text);line-height:1.25;margin-bottom:10px;letter-spacing:-1px;}
h1 em{font-style:normal;color:var(--purple);}
.sub{grid-column:1 / -1;grid-row:2;font-size:.85rem;font-weight:300;color:var(--gray);line-height:1.8;margin-bottom:28px;}
/* live badge */
.badge-wrap{grid-column:2;grid-row:1;display:flex;align-items:flex-start;padding-top:4px;}
.live-badge{display:flex;flex-direction:column;align-items:center;gap:6px;border:2px solid var(--orange);border-radius:16px;padding:10px 12px;background:rgba(255,84,0,.05);min-width:68px;animation:badge-breathe 3s ease-in-out infinite;}
@keyframes badge-breathe{0%,100%{box-shadow:0 0 0 0 rgba(255,84,0,0);}50%{box-shadow:0 0 0 6px rgba(255,84,0,.12);}}
.live-badge-top{display:flex;align-items:center;gap:5px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);animation:dot-pulse 1.4s ease-in-out infinite;flex-shrink:0;}
@keyframes dot-pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.7);}}
.live-text-main{font-size:.72rem;font-weight:700;color:var(--orange);white-space:nowrap;}
.live-divider{width:100%;height:1px;background:rgba(255,84,0,.2);}
.live-text-sub{font-size:.68rem;font-weight:500;color:var(--orange);opacity:.75;white-space:nowrap;}

/* cards */
.cards{padding:0 24px;display:flex;flex-direction:column;gap:14px;position:relative;}
.gift-box{position:absolute;top:-110px;right:-55px;width:min(341px,90vw);pointer-events:none;z-index:5;}
.cards-header{display:flex;justify-content:flex-end;margin-bottom:8px;}
.main-card{
  background:#fff;border:2px solid var(--purple);border-radius:22px;padding:30px;
  position:relative;overflow:hidden;
}
.main-card::before{content:'';position:absolute;top:-22px;right:-22px;width:88px;height:88px;background:var(--purple);border-radius:50%;opacity:.06;}
.main-card::after{content:'';position:absolute;bottom:-10px;left:28px;width:52px;height:52px;background:var(--purple);border-radius:50%;opacity:.04;}
.main-tag{font-size:.85rem;font-weight:700;color:var(--purple);letter-spacing:.3px;margin-bottom:10px;position:relative;z-index:1;}
.main-title{font-size:1.4rem;font-weight:900;color:var(--text);margin-bottom:6px;position:relative;z-index:1;letter-spacing:-.5px;}
.main-sub{font-size:.85rem;font-weight:300;color:var(--gray);margin-bottom:20px;position:relative;z-index:1;}
.main-btn{display:block;text-align:center;background:var(--orange);color:#fff;font-size:1.1rem;font-weight:700;border-radius:14px;padding:15px 20px;text-decoration:none;position:relative;z-index:1;letter-spacing:-.2px;}
.checker-card{background:#fff;border:2px solid var(--mint);border-radius:22px;padding:30px;}
.checker-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.checker-icon{width:46px;height:46px;background:rgba(166,214,222,.15);border:1.5px solid var(--mint);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.checker-name{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-.3px;}
.checker-desc{font-size:.85rem;font-weight:300;color:var(--gray);}
.checker-btn{display:block;width:100%;text-align:center;font-size:1.1rem;font-weight:700;border-radius:14px;padding:15px;text-decoration:none;color:#3a9aaa;background:transparent;border:2px solid var(--mint);letter-spacing:-.2px;}


/* 월드컵 이벤트 카드 (6월 한정) */
.worldcup-card{background:#fff;border:2px solid #CD2E3A;border-radius:22px;overflow:hidden;}
.worldcup-visual{width:100%;height:180px;object-fit:cover;display:block;}
.worldcup-body{padding:18px 20px 20px;}
.worldcup-tag{display:inline-block;background:rgba(205,46,58,.1);color:#CD2E3A;font-size:.75rem;font-weight:700;padding:4px 10px;border-radius:6px;margin-bottom:10px;}
.worldcup-title{font-size:1.2rem;font-weight:900;color:#1A1A2E;margin-bottom:4px;letter-spacing:-.3px;}
.worldcup-sub{font-size:.9rem;font-weight:700;color:#CD2E3A;margin-bottom:16px;line-height:1.6;}
.worldcup-subcopy{font-style:italic;font-size:.92rem;color:#CD2E3A;font-weight:700;margin-bottom:14px;}
.worldcup-desc{font-size:.85rem;color:#555;font-weight:500;line-height:1.65;margin-bottom:16px;}
.worldcup-btn{display:block;width:100%;text-align:center;font-size:1rem;font-weight:700;border-radius:14px;padding:13px;text-decoration:none;color:#CD2E3A;border:2px solid #CD2E3A;background:#fff;letter-spacing:-.2px;}
/* footer */
.footer{padding:24px 24px 32px;display:flex;justify-content:center;position:relative;z-index:2;}
.grad-bar{width:48%;height:3px;border-radius:10px;background:linear-gradient(90deg,var(--purple),var(--mint),var(--orange));}

/* ── TABLET / DESKTOP ≥768px ── */
@media(min-width:768px){
  .nav{padding:36px 60px 0;max-width:1280px;margin:0 auto;width:100%;}
  .logo-img{width:50px;height:50px;}
  .brand{font-size:1.05rem;}

  .content{
    flex-direction:row;
    align-items:center;
    max-width:1280px;
    margin:0 auto;
    padding:40px 60px 40px;
    gap:48px;
    min-height:calc(100vh - 100px);
  }

  .hero{flex:1;padding:0;}
  .cards-header{margin-bottom:12px;}
  .live-badge{padding:7px 16px;}
  .live-text{font-size:.75rem;}
  h1{font-size:3.2rem;margin-bottom:16px;}
  .sub{font-size:.95rem;margin-bottom:0;}

  .cards{flex:1;padding:0;gap:20px;}
  .main-card{border-radius:28px;padding:36px;}
  .main-tag{font-size:.9rem;margin-bottom:12px;}
  .main-title{font-size:1.6rem;margin-bottom:8px;}
  .main-sub{font-size:.9rem;margin-bottom:24px;}
  .main-btn{font-size:1.1rem;padding:16px 28px;}
  .checker-card{border-radius:28px;padding:36px;}
  .checker-icon{width:52px;height:52px;font-size:1.4rem;}
  .checker-name{font-size:1.2rem;}
  .checker-desc{font-size:.9rem;}
  .checker-btn{font-size:1.1rem;padding:16px;border-radius:14px;}

  .footer{max-width:1280px;margin:0 auto;padding:0 60px 40px;justify-content:flex-start;}
  .grad-bar{width:80px;}

  .orb-big{width:500px;height:500px;top:-150px;right:-150px;opacity:.06;}
  .orb-sm{width:200px;height:200px;top:250px;left:-60px;}
}

@media(min-width:1280px){
  .nav{padding:44px 80px 0;}
  .content{padding:60px 80px;gap:80px;}
  h1{font-size:4rem;}
  .footer{padding:0 80px 48px;}
}
</style>
</head>
